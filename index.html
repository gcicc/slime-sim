<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="description" content="Slime Simulator - Poke, stretch, swirl, slice digital slime with ASMR sounds.">
    <meta name="theme-color" content="#0d1117">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==">
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <title>Slime Simulator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #0d1117;
            color: #c4a882;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        canvas {
            flex: 1;
            display: block;
            background-color: #0d1117;
        }

        .ui-container {
            position: fixed;
            z-index: 100;
        }

        .header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            padding: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(13, 17, 23, 0.8), transparent);
        }

        .title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 24px;
            font-weight: 600;
            color: #c4a882;
        }

        .sound-toggle {
            background-color: #161b22;
            border: 2px solid #c4a882;
            color: #c4a882;
            width: 48px;
            height: 48px;
            border-radius: 8px;
            font-size: 20px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .sound-toggle:active {
            background-color: #c4a882;
            color: #0d1117;
        }

        .controls {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 16px;
            background: linear-gradient(to top, rgba(13, 17, 23, 0.9), transparent);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .slime-types {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .slime-type-btn {
            padding: 8px 14px;
            background-color: #161b22;
            border: 2px solid #c4a882;
            color: #c4a882;
            border-radius: 20px;
            font-family: 'Inter', sans-serif;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .slime-type-btn.active {
            background-color: #c4a882;
            color: #0d1117;
        }

        .slime-type-btn:active {
            transform: scale(0.95);
        }

        .colors {
            display: flex;
            gap: 8px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .color-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 2px solid rgba(196, 168, 130, 0.3);
            cursor: pointer;
            transition: all 0.2s;
        }

        .color-btn:hover {
            border-color: #c4a882;
        }

        .color-btn.active {
            border-color: #c4a882;
            box-shadow: 0 0 0 3px rgba(196, 168, 130, 0.2);
        }

        .onboarding {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(22, 27, 34, 0.95);
            border: 2px solid #c4a882;
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            z-index: 200;
            max-width: 80vw;
            animation: fadeIn 0.4s ease-out;
        }

        .onboarding h2 {
            font-family: 'Cormorant Garamond', serif;
            font-size: 28px;
            margin-bottom: 16px;
        }

        .onboarding p {
            font-size: 14px;
            color: #a8a8a8;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .onboarding-actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 20px;
        }

        .onboarding button {
            padding: 10px 20px;
            background-color: #161b22;
            border: 2px solid #c4a882;
            color: #c4a882;
            border-radius: 6px;
            font-family: 'Inter', sans-serif;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .onboarding button:active {
            background-color: #c4a882;
            color: #0d1117;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translate(-50%, -50%) scale(0.9);
            }
            to {
                opacity: 1;
                transform: translate(-50%, -50%) scale(1);
            }
        }

        @supports (padding: max(0px)) {
            body {
                padding-left: max(0px, env(safe-area-inset-left));
                padding-right: max(0px, env(safe-area-inset-right));
                padding-top: max(0px, env(safe-area-inset-top));
                padding-bottom: max(0px, env(safe-area-inset-bottom));
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="title">Slime Simulator</div>
        <button class="sound-toggle" id="soundToggle" title="Toggle sound">🔊</button>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
        <div class="slime-types" id="slimeTypes"></div>
        <div class="colors" id="colors"></div>
    </div>

    <div class="onboarding" id="onboarding">
        <h2>Touch the slime</h2>
        <p>Poke, stretch, swirl, slice</p>
        <div class="onboarding-actions">
            <button id="closeOnboarding">Let's go</button>
        </div>
    </div>

    <script>
        'use strict';

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log('SW registration failed:', err));
        }

        // ===== AUDIO ENGINE =====
        const AudioEngine = (() => {
            const ctx = new (window.AudioContext || window.webkitAudioContext)();
            let enabled = true;

            const playSquelch = (frequency = 150, duration = 0.15) => {
                if (!enabled) return;
                const osc = ctx.createOscillator();
                const filter = ctx.createBiquadFilter();
                const gain = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(frequency, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(50, ctx.currentTime + duration);

                filter.type = 'highpass';
                filter.frequency.setValueAtTime(200, ctx.currentTime);

                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + duration);

                osc.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            };

            const playStretch = (duration = 0.4) => {
                if (!enabled) return;
                const osc = ctx.createOscillator();
                const noise = ctx.createBufferSource();
                const gain = ctx.createGain();
                const filter = ctx.createBiquadFilter();

                // Pitch sweep
                osc.type = 'sine';
                osc.frequency.setValueAtTime(200, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + duration);

                // Noise for texture
                const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < buf.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buf;

                filter.type = 'highpass';
                filter.frequency.setValueAtTime(1000, ctx.currentTime);

                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.05, ctx.currentTime + duration);

                osc.connect(gain);
                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);

                osc.start(ctx.currentTime);
                noise.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
                noise.stop(ctx.currentTime + duration);
            };

            const playPop = (duration = 0.1) => {
                if (!enabled) return;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();

                osc.type = 'sine';
                osc.frequency.setValueAtTime(300, ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(100, ctx.currentTime + duration);

                gain.gain.setValueAtTime(0.2, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0, ctx.currentTime + duration);

                osc.connect(gain);
                gain.connect(ctx.destination);

                osc.start(ctx.currentTime);
                osc.stop(ctx.currentTime + duration);
            };

            const playSquish = (duration = 0.25) => {
                if (!enabled) return;
                const noise = ctx.createBufferSource();
                const gain = ctx.createGain();
                const filter = ctx.createBiquadFilter();

                const buf = ctx.createBuffer(1, ctx.sampleRate * duration, ctx.sampleRate);
                const data = buf.getChannelData(0);
                for (let i = 0; i < buf.length; i++) {
                    data[i] = (Math.random() * 2 - 1) * (1 - i / buf.length);
                }
                noise.buffer = buf;

                filter.type = 'lowpass';
                filter.frequency.setValueAtTime(1500, ctx.currentTime);
                filter.frequency.exponentialRampToValueAtTime(600, ctx.currentTime + duration);

                gain.gain.setValueAtTime(0.15, ctx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0, ctx.currentTime + duration);

                noise.connect(filter);
                filter.connect(gain);
                gain.connect(ctx.destination);

                noise.start(ctx.currentTime);
                noise.stop(ctx.currentTime + duration);
            };

            return {
                playSquelch,
                playStretch,
                playPop,
                playSquish,
                toggle: () => { enabled = !enabled; return enabled; },
                isEnabled: () => enabled,
            };
        })();

        // ===== SLIME TYPES & COLORS =====
        const SlimeTypes = {
            classic: { name: 'Classic', bounce: 0.25, damping: 0.92, renderFn: 'renderClassic' },
            glitter: { name: 'Glitter', bounce: 0.3, damping: 0.90, renderFn: 'renderGlitter' },
            butter: { name: 'Butter', bounce: 0.15, damping: 0.95, renderFn: 'renderButter' },
            cloud: { name: 'Cloud', bounce: 0.4, damping: 0.88, renderFn: 'renderCloud' },
            galaxy: { name: 'Galaxy', bounce: 0.25, damping: 0.91, renderFn: 'renderGalaxy' },
        };

        const ColorPalette = [
            '#FF6B9D', // Pink
            '#4ECDC4', // Teal
            '#FFE66D', // Yellow
            '#95E1D3', // Mint
            '#FF8B94', // Salmon
            '#A8E6CF', // Lime
            '#FFD3B6', // Peach
            '#FFAAA5', // Rose
        ];

        // ===== SLIME PHYSICS =====
        class SlimeBlob {
            constructor(x, y, radius, type, color) {
                this.centerX = x;
                this.centerY = y;
                this.radius = radius;
                this.type = type;
                this.color = color;

                this.numPoints = 32;
                this.points = [];
                this.velocities = [];

                for (let i = 0; i < this.numPoints; i++) {
                    const angle = (i / this.numPoints) * Math.PI * 2;
                    this.points.push({
                        x: this.centerX + Math.cos(angle) * this.radius,
                        y: this.centerY + Math.sin(angle) * this.radius,
                        baseX: this.centerX + Math.cos(angle) * this.radius,
                        baseY: this.centerY + Math.sin(angle) * this.radius,
                    });
                    this.velocities.push({ x: 0, y: 0 });
                }

                this.targetCenterX = this.centerX;
                this.targetCenterY = this.centerY;
                this.cuts = [];
            }

            update() {
                const { bounce, damping } = this.type;
                const dt = 0.02;
                const springStrength = 0.15;
                const internalForce = 0.05;

                for (let i = 0; i < this.numPoints; i++) {
                    const p = this.points[i];
                    const v = this.velocities[i];

                    v.x *= damping;
                    v.y *= damping;

                    const dx = p.baseX - p.x;
                    const dy = p.baseY - p.y;
                    const distSq = dx * dx + dy * dy;
                    if (distSq > 1) {
                        const dist = Math.sqrt(distSq);
                        v.x += (dx / dist) * springStrength;
                        v.y += (dy / dist) * springStrength;
                    }

                    const n1 = (i - 1 + this.numPoints) % this.numPoints;
                    const n2 = (i + 1) % this.numPoints;
                    const p1 = this.points[n1];
                    const p2 = this.points[n2];

                    const dx1 = p1.x - p.x;
                    const dy1 = p1.y - p.y;
                    const dist1 = Math.sqrt(dx1 * dx1 + dy1 * dy1);

                    const dx2 = p2.x - p.x;
                    const dy2 = p2.y - p.y;
                    const dist2 = Math.sqrt(dx2 * dx2 + dy2 * dy2);

                    if (dist1 > 1) {
                        v.x += (dx1 / dist1) * internalForce;
                        v.y += (dy1 / dist1) * internalForce;
                    }
                    if (dist2 > 1) {
                        v.x += (dx2 / dist2) * internalForce;
                        v.y += (dy2 / dist2) * internalForce;
                    }

                    p.x += v.x;
                    p.y += v.y;
                }

                this.centerX += 0.1 * (this.targetCenterX - this.centerX);
                this.centerY += 0.1 * (this.targetCenterY - this.centerY);
            }

            poke(x, y, strength = 30) {
                const closest = this.getClosestPoint(x, y);
                if (closest !== -1) {
                    const p = this.points[closest];
                    const dx = p.x - x;
                    const dy = p.y - y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 100) {
                        const force = strength * (1 - dist / 100);
                        this.velocities[closest].x -= (dx / (dist || 1)) * force;
                        this.velocities[closest].y -= (dy / (dist || 1)) * force;
                    }
                }
                AudioEngine.playSquelch();
            }

            stretch(startX, startY, endX, endY) {
                const closest = this.getClosestPoint(startX, startY);
                if (closest !== -1) {
                    const strength = Math.hypot(endX - startX, endY - startY) * 0.5;
                    this.velocities[closest].x = (endX - startX) * 0.8;
                    this.velocities[closest].y = (endY - startY) * 0.8;
                }
                AudioEngine.playStretch();
            }

            swirl(x, y, angle) {
                const closest = this.getClosestPoint(x, y);
                if (closest !== -1) {
                    for (let i = -2; i <= 2; i++) {
                        const idx = (closest + i + this.numPoints) % this.numPoints;
                        const tangentX = Math.cos(angle);
                        const tangentY = Math.sin(angle);
                        this.velocities[idx].x += tangentX * 5;
                        this.velocities[idx].y += tangentY * 5;
                    }
                }
            }

            slice(x, y) {
                const closest = this.getClosestPoint(x, y);
                if (closest !== -1) {
                    this.cuts.push({ point: closest, time: 0, maxTime: 30 });
                    AudioEngine.playPop();
                }
            }

            fold(startX, startY, endX, endY) {
                const closest = this.getClosestPoint(startX, startY);
                if (closest !== -1) {
                    const n = (closest + 8) % this.numPoints;
                    this.velocities[n].x = (endX - startX) * 0.6;
                    this.velocities[n].y = (endY - startY) * 0.6;
                }
                AudioEngine.playSquish();
            }

            getClosestPoint(x, y) {
                let closest = -1;
                let minDist = Infinity;
                for (let i = 0; i < this.numPoints; i++) {
                    const dist = Math.hypot(this.points[i].x - x, this.points[i].y - y);
                    if (dist < minDist) {
                        minDist = dist;
                        closest = i;
                    }
                }
                return minDist < 150 ? closest : -1;
            }

            updateCuts() {
                this.cuts = this.cuts.filter(cut => {
                    cut.time++;
                    return cut.time < cut.maxTime;
                });
            }
        }

        // ===== RENDERING =====
        const Renderer = (() => {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');

            const setCanvasSize = () => {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            };

            const drawGlitter = (x, y, radius, color) => {
                ctx.save();
                ctx.fillStyle = color;
                ctx.globalAlpha = 0.6;
                for (let i = 0; i < 30; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * radius * 0.8;
                    const gx = x + Math.cos(angle) * r;
                    const gy = y + Math.sin(angle) * r;
                    ctx.fillRect(gx - 2, gy - 2, 4, 4);
                }
                ctx.restore();
            };

            const renderClassic = (slime) => {
                ctx.save();

                // Draw blob
                ctx.beginPath();
                for (let i = 0; i < slime.numPoints; i++) {
                    const p = slime.points[i];
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.closePath();

                const grad = ctx.createRadialGradient(slime.centerX - 20, slime.centerY - 20, 0, slime.centerX, slime.centerY, slime.radius * 1.2);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.4)');
                grad.addColorStop(0.5, slime.color);
                grad.addColorStop(1, 'rgba(0, 0, 0, 0.2)');
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.lineWidth = 1;
                ctx.stroke();

                ctx.restore();
            };

            const renderGlitter = (slime) => {
                renderClassic(slime);
                drawGlitter(slime.centerX, slime.centerY, slime.radius, '#FFD700');
            };

            const renderButter = (slime) => {
                ctx.save();
                ctx.beginPath();
                for (let i = 0; i < slime.numPoints; i++) {
                    const p = slime.points[i];
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.closePath();

                const grad = ctx.createRadialGradient(slime.centerX, slime.centerY, 0, slime.centerX, slime.centerY, slime.radius * 1.1);
                grad.addColorStop(0, 'rgba(255, 255, 200, 0.2)');
                grad.addColorStop(1, slime.color);
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            };

            const renderCloud = (slime) => {
                ctx.save();
                ctx.beginPath();
                for (let i = 0; i < slime.numPoints; i++) {
                    const p = slime.points[i];
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.closePath();

                const grad = ctx.createRadialGradient(slime.centerX, slime.centerY, 0, slime.centerX, slime.centerY, slime.radius);
                grad.addColorStop(0, 'rgba(255, 255, 255, 0.5)');
                grad.addColorStop(1, slime.color);
                ctx.fillStyle = grad;
                ctx.fill();

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.05)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            };

            const renderGalaxy = (slime) => {
                ctx.save();
                ctx.beginPath();
                for (let i = 0; i < slime.numPoints; i++) {
                    const p = slime.points[i];
                    if (i === 0) ctx.moveTo(p.x, p.y);
                    else ctx.lineTo(p.x, p.y);
                }
                ctx.closePath();

                const grad = ctx.createRadialGradient(slime.centerX - 30, slime.centerY - 30, 0, slime.centerX, slime.centerY, slime.radius * 1.3);
                grad.addColorStop(0, 'rgba(255, 150, 200, 0.3)');
                grad.addColorStop(0.5, slime.color);
                grad.addColorStop(1, 'rgba(50, 10, 100, 0.5)');
                ctx.fillStyle = grad;
                ctx.fill();

                // Star speckles
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                for (let i = 0; i < 20; i++) {
                    const angle = Math.random() * Math.PI * 2;
                    const r = Math.random() * slime.radius * 0.7;
                    const sx = slime.centerX + Math.cos(angle) * r;
                    const sy = slime.centerY + Math.sin(angle) * r;
                    ctx.fillRect(sx - 1.5, sy - 1.5, 3, 3);
                }

                ctx.strokeStyle = 'rgba(0, 0, 0, 0.2)';
                ctx.lineWidth = 1;
                ctx.stroke();
                ctx.restore();
            };

            return {
                setCanvasSize,
                renderClassic,
                renderGlitter,
                renderButter,
                renderCloud,
                renderGalaxy,
                clear: () => {
                    ctx.fillStyle = '#0d1117';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                },
                getCtx: () => ctx,
                getCanvas: () => canvas,
            };
        })();

        // ===== APP STATE =====
        let currentSlimeType = 'classic';
        let currentColor = ColorPalette[0];
        let slime = null;
        let touchStart = null;
        let lastTouchPos = null;
        let touchStartTime = 0;

        const initSlime = () => {
            const canvas = Renderer.getCanvas();
            slime = new SlimeBlob(canvas.width / 2, canvas.height / 2, 80, SlimeTypes[currentSlimeType], currentColor);
        };

        const setupUI = () => {
            // Slime type buttons
            const typesContainer = document.getElementById('slimeTypes');
            typesContainer.innerHTML = '';
            Object.entries(SlimeTypes).forEach(([key, type]) => {
                const btn = document.createElement('button');
                btn.className = 'slime-type-btn' + (key === 'classic' ? ' active' : '');
                btn.textContent = type.name;
                btn.onclick = () => {
                    document.querySelectorAll('.slime-type-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentSlimeType = key;
                    slime.type = SlimeTypes[key];
                };
                typesContainer.appendChild(btn);
            });

            // Color buttons
            const colorsContainer = document.getElementById('colors');
            colorsContainer.innerHTML = '';
            ColorPalette.forEach((color, idx) => {
                const btn = document.createElement('button');
                btn.className = 'color-btn' + (idx === 0 ? ' active' : '');
                btn.style.backgroundColor = color;
                btn.onclick = () => {
                    document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentColor = color;
                    slime.color = color;
                };
                colorsContainer.appendChild(btn);
            });

            // Sound toggle
            document.getElementById('soundToggle').onclick = () => {
                const enabled = AudioEngine.toggle();
                document.getElementById('soundToggle').textContent = enabled ? '🔊' : '🔇';
            };

            // Onboarding
            document.getElementById('closeOnboarding').onclick = () => {
                document.getElementById('onboarding').style.display = 'none';
            };
        };

        const handleTouchStart = (e) => {
            if (e.touches.length === 1) {
                const touch = e.touches[0];
                touchStart = { x: touch.clientX, y: touch.clientY };
                lastTouchPos = { x: touch.clientX, y: touch.clientY };
                touchStartTime = Date.now();
            }
        };

        const handleTouchMove = (e) => {
            if (!touchStart || !slime) return;
            e.preventDefault();

            const touch = e.touches[0];
            const currentX = touch.clientX;
            const currentY = touch.clientY;
            const dx = currentX - lastTouchPos.x;
            const dy = currentY - lastTouchPos.y;
            const totalDx = currentX - touchStart.x;
            const totalDy = currentY - touchStart.y;
            const distance = Math.hypot(totalDx, totalDy);

            if (distance < 15) {
                slime.poke(currentX, currentY, 20);
            } else if (distance > 40 && distance < 200) {
                const isCircular = Math.abs(dx * dy) > 100 && Math.hypot(dx, dy) > 10;
                if (isCircular) {
                    const angle = Math.atan2(dy, dx);
                    slime.swirl(lastTouchPos.x, lastTouchPos.y, angle);
                } else {
                    slime.stretch(touchStart.x, touchStart.y, currentX, currentY);
                }
            } else if (distance > 150) {
                const velocity = distance / (Date.now() - touchStartTime);
                if (velocity > 2) {
                    slime.slice(currentX, currentY);
                } else {
                    slime.fold(touchStart.x, touchStart.y, currentX, currentY);
                }
            }

            lastTouchPos = { x: currentX, y: currentY };
        };

        const handleTouchEnd = (e) => {
            touchStart = null;
            lastTouchPos = null;
        };

        const animate = () => {
            Renderer.clear();
            slime.update();
            slime.updateCuts();

            const renderFn = Renderer[slime.type.renderFn];
            if (renderFn) {
                renderFn(slime);
            }

            requestAnimationFrame(animate);
        };

        // ===== INIT =====
        window.addEventListener('resize', () => {
            Renderer.setCanvasSize();
        });

        document.addEventListener('touchstart', handleTouchStart, { passive: false });
        document.addEventListener('touchmove', handleTouchMove, { passive: false });
        document.addEventListener('touchend', handleTouchEnd);

        Renderer.setCanvasSize();
        setupUI();
        initSlime();
        animate();
    </script>
</body>
</html>
